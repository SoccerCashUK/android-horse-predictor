name: Update race data

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows you to click the manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run updater
        # This section connects your Vault Secrets to the Script
        env:
          RACING_API_USER: ${{ secrets.RACING_API_USER }}
          RACING_API_PASS: ${{ secrets.RACING_API_PASS }}
        run: |
          python -m pip install requests
          python scripts/update_races.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/upcoming_races.json
          git commit -m "Update race data from API" || echo "No changes to commit"
          git push
