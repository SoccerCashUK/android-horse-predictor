name: Update race data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: python -m pip install requests

      - name: Run updater
        # This block MUST be exactly 8 spaces in from the left margin
        env:
          RACING_API_USER: ${{ secrets.RACING_API_USER }}
          RACING_API_PASS: ${{ secrets.RACING_API_PASS }}
        run: python scripts/update_races.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/upcoming_races.json
          git commit -m "Update race data from API" || echo "No changes to commit"
          git push
